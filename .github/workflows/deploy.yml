name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }} \
            --build-arg VITE_APP_KEY=${{ secrets.VITE_APP_KEY }} \
            -t ghcr.io/${{ github.repository_owner }}/isitcorrect-frontend:latest \
            -t ghcr.io/${{ github.repository_owner }}/isitcorrect-frontend:${{ github.sha }} .

      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/isitcorrect-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/isitcorrect-frontend:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/isitcorrect

            docker compose pull frontend

            docker compose up -d frontend

            docker image prune -af