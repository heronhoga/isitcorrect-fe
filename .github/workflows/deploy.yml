name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }} \
            --build-arg VITE_APP_KEY=${{ secrets.VITE_APP_KEY }} \
            -t ghcr.io/${{ github.repository_owner }}/isitcorrect-frontend:latest .

      - name: Push image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/isitcorrect-frontend:latest